name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy → app.tetapi.dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js (standalone)
        run: npx next build --no-lint
        env:
          NEXT_PUBLIC_API_URL: https://api.tetapi.dev

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/tetapi_ed25519
          chmod 600 ~/.ssh/tetapi_ed25519
          ssh-keyscan -H 164.90.235.66 >> ~/.ssh/known_hosts

      - name: Sync Next.js standalone
        run: |
          # NOTE (5.3 split): pre-split, `next build` ran from the monorepo's
          # web/ subdir, so standalone tracing baked in a nested `web/` folder
          # (matching systemd's WorkingDirectory=/opt/tetapi/web/web). Now that
          # this repo IS the app root, standalone output is flat — reconstruct
          # the same on-disk layout by rsyncing one level deeper instead of
          # changing the systemd unit.
          ssh -i ~/.ssh/tetapi_ed25519 root@164.90.235.66 \
            "mkdir -p /opt/tetapi/web/web"

          rsync -az -e "ssh -i ~/.ssh/tetapi_ed25519" \
            --delete --exclude='cache' \
            .next/standalone/ root@164.90.235.66:/opt/tetapi/web/web/

          ssh -i ~/.ssh/tetapi_ed25519 root@164.90.235.66 \
            "mkdir -p /opt/tetapi/web/web/.next/static"

          rsync -az -e "ssh -i ~/.ssh/tetapi_ed25519" \
            --delete \
            .next/static/ root@164.90.235.66:/opt/tetapi/web/web/.next/static/

          rsync -az -e "ssh -i ~/.ssh/tetapi_ed25519" \
            .next/server/ root@164.90.235.66:/opt/tetapi/web/web/.next/server/

      # ⚠ Add new top-level pages/routes to app-paths-manifest.json below.
      - name: Patch standalone output + restart
        run: |
          ssh -i ~/.ssh/tetapi_ed25519 root@164.90.235.66 bash << 'REMOTE'
          set -e
          NEXT="/opt/tetapi/web/web/.next"

          for chunk in "$NEXT/server/chunks/"[0-9]*.js; do
            [ -f "$chunk" ] && cp -n "$chunk" "$NEXT/server/$(basename $chunk)" 2>/dev/null || true
          done

          BUILD_ID=$(head -c 40 "$NEXT/BUILD_ID" | tr -d '\n')
          printf '%s' "$BUILD_ID" > "$NEXT/BUILD_ID"

          cat > "$NEXT/server/app-paths-manifest.json" << 'JSON'
          {
            "/page": "app/page.js",
            "/profile/page": "app/profile/page.js",
            "/claim/page": "app/claim/page.js",
            "/admin/page": "app/admin/page.js",
            "/settings/page": "app/settings/page.js",
            "/login/page": "app/login/page.js",
            "/e/[slug]/page": "app/e/[slug]/page.js",
            "/search/page": "app/search/page.js",
            "/.well-known/agent.json/route": "app/.well-known/agent.json/route.js",
            "/icon.svg/route": "app/icon.svg/route.js",
            "/apple-icon.png/route": "app/apple-icon.png/route.js",
            "/_not-found/page": "app/_not-found/page.js"
          }
          JSON

          systemctl restart tetapi-web
          sleep 4
          systemctl is-active --quiet tetapi-web \
            && echo "✓ Web up" \
            || { journalctl -u tetapi-web -n 30 --no-pager; exit 1; }
          REMOTE
